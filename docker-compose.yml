services:
  app:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: resumecraft-app
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      PORT: 8787

      # 数据库（使用 docker-compose 服务名作为主机名）
      PG_DSN: postgres://resumecraft:resumecraft@postgres:5432/resumecraft?sslmode=disable

      # 认证
      AUTH_ENABLED: "true"
      AUTH_JWT_SECRET: "${JWT_SECRET:-change-this-in-production-32ch}"

      # PDF/Chromium 配置
      CHROMIUM_HEADLESS: "true"
      CHROMIUM_DISABLE_GPU: "true"
      CHROMIUM_NO_SANDBOX: "true"
      CHROMIUM_DISABLE_SETUID_SANDBOX: "true"
      PDF_RENDER_TIMEOUT_SEC: 60
      PDF_VIEWPORT_WIDTH: 794
      PDF_VIEWPORT_HEIGHT: 1123
      PDF_DEVICE_SCALE_FACTOR: "1"
      PDF_PAPER_WIDTH_INCH: "8.27"
      PDF_PAPER_HEIGHT_INCH: "11.69"
      PDF_SCALE: "1"

      # AI 加密密钥
      AI_ENCRYPTION_KEY: "${AI_ENCRYPTION_KEY:-change-this-32-char-key!!}"

      PARSER_SERVICE_URL: "http://python-parser:9002"

      # Redis
      REDIS_ENABLED: "true"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DB: "0"

      # 限流
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_FAIL_OPEN: "true"
      RATE_LIMIT_AUTH_CAPACITY: "8"
      RATE_LIMIT_AUTH_REFILL_PER_SEC: "0.2"
      RATE_LIMIT_AI_CAPACITY: "20"
      RATE_LIMIT_AI_REFILL_PER_SEC: "0.05"

      TZ: Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      python-parser:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8787/api/pdf/export" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: oyh0mq3odt54g3vzjv.xuanyuan.run/library/postgres:16.14
    container_name: resumecraft-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: resumecraft
      POSTGRES_PASSWORD: resumecraft
      POSTGRES_DB: resumecraft
      TZ: Asia/Shanghai
    volumes:
      - ./docker/postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U resumecraft -d resumecraft -h 127.0.0.1 -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 5
  minio:
    image: oyh0mq3odt54g3vzjv.xuanyuan.run/minio/minio:latest
    container_name: resumecraft-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
    volumes:
      - ./docker/minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5

  python-parser:
    build:
      context: ./python-parser
      dockerfile: Dockerfile
    container_name: resumecraft-parser
    restart: unless-stopped
    ports:
      - "9002:9002"
    environment:
      PARSER_PORT: "9002"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9002/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: oyh0mq3odt54g3vzjv.xuanyuan.run/library/redis:7-alpine
    container_name: resumecraft-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - ./docker/redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: oyh0mq3odt54g3vzjv.xuanyuan.run/library/nginx:alpine
    container_name: resumecraft-web
    restart: unless-stopped
    ports:
      - "89:80"
    volumes:
      - ../docker/frontend:/usr/share/nginx/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
